  - name: disable old nodejs and enable nodejs
    ansible.builtin.shell: dnf module disable nodejs -y ; dnf module enable nodejs:20 -y

  - name: Install nodejs
    ansible.builtin.dnf:
      name: nodejs 
      state: present

  - name: create roboshop user
    ansible.builtin.user:
      name: roboshop

  - name: Recursively remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: download user application
    ansible.builtin.get_url:
      url: https://roboshop-builds.s3.amazonaws.com/user.zip
      dest: /tmp

  - name: extract user application
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: Install dependencies
    ansible.builtin.command: npm install
    args:
      chdir: /app

  - name: Copy user service
    ansible.builtin.template:
      src: user.service.j2
      dest: /etc/systemd/system/user.service

  - name: deamon reload and start
    ansible.builtin.systemd_service:
      daemon_reload: true

  # let's start after the data is loaded
  - name: Copy mongodb repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongodb-mongosh client
    ansible.builtin.package:
      name: mongodb-mongosh
      state: present

  - name: get the users count
    ansible.builtin.command:  mongosh --host mongodb.lingaiah.online --quiet --eval 'db = db.getSiblingDB("users"); db.users.countDocuments()'
    register: user_count

  - name: print the count
    ansible.builtin.debug:
      msg: "product count: {{user_count}}"

  - name: load user data
    ansible.builtin.command: mongosh --host mongodb.lingaiah.online < /app/schema/user.js
    when: user_count.stdout == "0" # keep double quotes

  - name: start and enable user
    ansible.builtin.service:
      name: user
      state: restarted
      enabled: yes